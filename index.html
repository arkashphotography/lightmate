      function getExifOrientation(buffer) {
        const view = new DataView(buffer);
        if (view.getUint16(0, false) !== 0xFFD8) return 1;
        let offset = 2;
        while (offset < view.byteLength) {
          const marker = view.getUint16(offset, false);
          offset += 2;
          if (marker === 0xFFE1) {
            if (view.getUint32(offset + 2, false) === 0x45786966) {
              const little = view.getUint16(offset + 8, false) === 0x4949;
              const ifd = offset + 8 + view.getUint32(offset + 14, little);
              const tags = view.getUint16(ifd, little);
              for (let i = 0; i < tags; i++) {
                if (view.getUint16(ifd + 2 + i * 12, little) === 0x0112)
                  return view.getUint16(ifd + 2 + i * 12 + 8, little);
              }
            }
            return 1;
          }
          if ((marker & 0xFF00) !== 0xFF00) break;
          offset += view.getUint16(offset, false);
        }
        return 1;

      function handleFile(file) {
        const arrayReader = new FileReader();
        arrayReader.onload = ae => {
          const orientation = getExifOrientation(ae.target.result);
          const dataReader = new FileReader();
          dataReader.onload = e => {
            const original = e.target.result;
            setPreview(original);
            const img = new Image();
            img.onload = () => {
              const MAX = 1600;
              const swapped = orientation >= 5 && orientation <= 8;
              let w = swapped ? img.height : img.width;
              let h = swapped ? img.width : img.height;
              if (w > MAX || h > MAX) {
                if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                else { w = Math.round(w * MAX / h); h = MAX; }
              }
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.save();
              if (orientation === 2) { ctx.translate(w, 0); ctx.scale(-1, 1); }
              else if (orientation === 3) { ctx.translate(w, h); ctx.rotate(Math.PI); }
              else if (orientation === 4) { ctx.translate(0, h); ctx.scale(1, -1); }
              else if (orientation === 5) { ctx.rotate(Math.PI/2); ctx.scale(1, -1); }
              else if (orientation === 6) { ctx.translate(w, 0); ctx.rotate(Math.PI/2); }
              else if (orientation === 7) { ctx.translate(w, h); ctx.rotate(Math.PI/2); ctx.scale(1, -1); }
              else if (orientation === 8) { ctx.translate(0, h); ctx.rotate(-Math.PI/2); }
              if (swapped) ctx.drawImage(img, 0, 0, h, w);
              else ctx.drawImage(img, 0, 0, w, h);
              ctx.restore();
              const compressed = canvas.toDataURL('image/jpeg', 0.85);
              setImgType('image/jpeg');
              setImgB64(compressed.split(',')[1]);
              setPreview(compressed);
            };
            img.src = original;
          };
          dataReader.readAsDataURL(file);
        };
        arrayReader.readAsArrayBuffer(file);
      }

      async function analyze() {
        setStep(2); setError(null); setDoneSteps([]); clearTimers();
        const scanStepsText = SCAN_STEPS[lang];
        scanStepsText.forEach((txt, i) => {
          const timer = setTimeout(() => setDoneSteps(prev => [...prev, txt]), i * 1600 + 400);
          timers.current.push(timer);
        });
        const scanPromptLang = lang === 'en' ? SCAN_PROMPT + '\nRespond with all text values in English.' : SCAN_PROMPT;

        try {
          const resp = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 2500,
              system: 'You are a professional photography lighting expert. Always respond with valid JSON only, no markdown, no explanation, no code blocks. Just raw JSON.',
              messages: [{
                role: 'user',
                content: [
                  { type: 'image', source: { type: 'base64', media_type: imgType, data: imgB64 } },
                  { type: 'text', text: scanPromptLang },
                ],
              }],
            }),
          });

          const rawText = await resp.text();
          console.log('Server response status:', resp.status);
          console.log('Server response body:', rawText.slice(0, 500));
          let data;
          try { data = JSON.parse(rawText); } catch(e) {
            throw new Error(`תגובה לא תקינה מהשרת (${resp.status}): ${rawText.slice(0, 100)}`);
          }
          if (!resp.ok) throw new Error(data.error?.message || `שגיאה ${resp.status}`);

          const raw = data.content[0].text;
          // Try to extract JSON - handle markdown code blocks too
          const cleaned = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          const match = cleaned.match(/\{[\s\S]*\}/);
          if (!match) throw new Error('לא התקבל JSON תקין מה-AI. נסה שוב.');
          clearTimers();
          try {
            setResults(JSON.parse(match[0]));
          } catch (parseErr) {
            throw new Error('שגיאה בעיבוד תגובת ה-AI. נסה שוב.');
          }
          setStep(3);
        } catch (err) {
          clearTimers();
          setError(err.message);
          setStep(1);
        }
      }

      // ── Step 3: Results ───────────────────────────────────────────────────

    // ─── GUIDE ────────────────────────────────────────────────────────────────
    function GuidePage() {
      const t    = useT();
      const lang = React.useContext(LangContext);
      const [step, setStep]     = useState(0);
      const [shoot, setShoot]   = useState('');
      const [lights, setLights] = useState('');
      const [result, setResult] = useState(null);

      const shootTypes   = [{ id:'portrait',label:t('פורטרט','Portrait'),icon:'👤' },{ id:'product',label:t('מוצר','Product'),icon:'📦' },{ id:'fashion',label:t('אופנה','Fashion'),icon:'👗' }];
      const lightOptions = [{ id:'1',label:t('אור אחד','One Light'),icon:'💡' },{ id:'2',label:t('שני אורות','Two Lights'),icon:'💡💡' },{ id:'3',label:t('שלושה+','Three+'),icon:'💡💡💡' }];
      const styleOptions = [{ id:'dramatic',label:t('דרמטי','Dramatic'),desc:t('צללים חזקים, קונטרסט','Strong shadows, contrast') },{ id:'soft',label:t('רך','Soft'),desc:t('אור פרוש, מחמיא','Spread light, flattering') },{ id:'natural',label:t('טבעי','Natural'),desc:t('דמוי אור יום','Daylight-like') }];

      function pickStyle(styleId) {
        const key  = `${shoot}-${lights}-${styleId}`;
        const r    = GUIDE_RESULTS[key];
        const sid  = r ? r.sid : 1;
        const exp  = r
          ? (lang==='en' && r.expEn ? r.expEn : r.exp)
          : (lang==='en' ? 'Rembrandt is an excellent starting point for any type of photography!' : 'Rembrandt הוא נקודת התחלה מצוינת לכל סוג צילום!');
        setResult({ setup: getSetup(sid), specs: SETUP_SPECS[sid], exp });
        setStep(3);
      }
      function reset() { setStep(0); setShoot(''); setLights(''); setResult(null); }

      const stepLabels = [t('סוג צילום','Shoot Type'), t('מקורות אור','Light Sources'), t('סגנון','Style')];

      // Result screen
      if (step === 3 && result) {
        const { setup, specs, exp } = result;
        const setupDisplayName = lang === 'en' ? setup.name : setup.nameHe;
        return (
          <div style={{ paddingBottom:100 }}>

            {/* ── Header ── */}
            <div style={{ background:'linear-gradient(160deg,#1A1100,#100D00)', borderBottom:`1px solid ${C.amber}22`, padding:'14px 18px 16px' }}>
              <button onClick={reset} style={{ color:C.amber, background:'none', border:'none', cursor:'pointer', fontSize:13, padding:0, marginBottom:12 }}>{t('← סט-אפ חדש', 'New Setup →')}</button>
              <div style={{ color:C.amber, fontSize:11, fontWeight:700, letterSpacing:1, marginBottom:4 }}>{t('✨ ההמלצה שלנו', '✨ Our Recommendation')}</div>
              <div style={{ color:'#fff', fontSize:22, fontWeight:800, marginBottom:4 }}>{setupDisplayName}</div>
              <div style={{ color:C.textSub, fontSize:13, lineHeight:1.6 }}>{exp}</div>
            </div>

            {/* ── Diagram ── */}
            <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:'20px 0', display:'flex', justifyContent:'center' }}>
              <LightingDiagram type={setup.diagram} size={220} />
            </div>

            {/* ── 📍 Positions ── */}
            <div style={{ padding:'16px 18px', borderBottom:`1px solid ${C.border}` }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                <span style={{ fontSize:15 }}>📍</span>
                <span style={{ color:'#fff', fontSize:14, fontWeight:700 }}>{t('מיקום פנסים', 'Light Positions')}</span>
              </div>
              {specs.lights.map((l, i) => (
                <div key={i} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:'12px 14px', marginBottom:8 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                    <div style={{ width:9, height:9, borderRadius:'50%', background:l.color, flexShrink:0 }} />
                    <span style={{ color:l.color, fontSize:13, fontWeight:700 }}>{l.name}</span>
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px 12px' }}>
                    {[[t('זווית','Angle'), l.angle], [t('מרחק','Distance'), l.dist], [t('גובה','Height'), l.height]].map(([label, val]) => (
                      <div key={label} style={{ gridColumn: label === t('גובה','Height') ? '1/-1' : undefined }}>
                        <div style={{ color:C.textMuted, fontSize:10, marginBottom:2 }}>{label}</div>
                        <div style={{ color:'#E5E7EB', fontSize:12, fontWeight:500 }}>{val}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
                    <span style={{ background:`${C.amber}18`, color:C.amber, fontSize:11, padding:'3px 10px', borderRadius:10, fontWeight:600 }}>{l.modifier}</span>
                    {l.power !== 'N/A' && <span style={{ background:C.border, color:C.textSub, fontSize:11, padding:'3px 10px', borderRadius:10 }}>{l.power}</span>}
                  </div>
                </div>
              ))}
            </div>

            {/* ── 📷 Camera ── */}
            <div style={{ padding:'16px 18px', borderBottom:`1px solid ${C.border}` }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                <span style={{ fontSize:15 }}>📷</span>
                <span style={{ color:'#fff', fontSize:14, fontWeight:700 }}>{t('הגדרות מצלמה', 'Camera Settings')}</span>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
                {[[t('צמצם','Aperture'), specs.camera.aperture], ['ISO', specs.camera.iso], [t('שאטר','Shutter'), specs.camera.shutter]].map(([label, val]) => (
                  <div key={label} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'12px 8px', textAlign:'center' }}>
                    <div style={{ color:C.textMuted, fontSize:10, marginBottom:5 }}>{label}</div>
                    <div style={{ color:C.amber, fontSize:15, fontWeight:800, letterSpacing:'-0.5px' }}>{val}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── ⚖️ Ratio ── */}
            <div style={{ padding:'14px 18px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'flex-start', gap:10 }}>
              <span style={{ fontSize:15, marginTop:1 }}>⚖️</span>
              <div>
                <div style={{ color:'#fff', fontSize:13, fontWeight:700, marginBottom:4 }}>{t('יחסי תאורה', 'Lighting Ratio')}</div>
                <div style={{ color:C.textSub, fontSize:13 }}>{lang==='en' && specs.ratioEn ? specs.ratioEn : specs.ratio}</div>
              </div>
            </div>

            {/* ── 💡 Pro Tip ── */}
            <div style={{ padding:'14px 18px', marginBottom:4 }}>
              <div style={{ background:'#1A1000', border:`1px solid ${C.amber}30`, borderRadius:14, padding:'14px 16px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
                  <span style={{ fontSize:14 }}>💡</span>
                  <span style={{ color:C.amber, fontSize:13, fontWeight:700 }}>{t('טיפ מקצועי', 'Pro Tip')}</span>
                </div>
                <div style={{ color:'#D1D5DB', fontSize:13, lineHeight:1.7 }}>{lang==='en' && specs.tipEn ? specs.tipEn : specs.tip}</div>
              </div>
            </div>

            <div style={{ padding:'0 18px' }}>
              <button onClick={reset} style={{ background:C.amber, color:'#000', width:'100%', padding:'14px 0', borderRadius:16, fontSize:14, fontWeight:700, border:'none', cursor:'pointer' }}>{t('צור סט-אפ חדש', 'Create New Setup')}</button>
            </div>
          </div>
        );
      }

      return (
        <div style={{ padding:'24px 18px 100px' }}>
          <div style={{ color:'#fff', fontSize:24, fontWeight:800, marginBottom:2 }}>{t('מדריך תאורה חכם', 'Smart Lighting Guide')}</div>
          <div style={{ color:C.textMuted, fontSize:13, marginBottom:20 }}>{t('3 שאלות → סט-אפ מושלם', '3 questions → perfect setup')}</div>

          {/* Progress */}
          <div style={{ display:'flex', gap:6, marginBottom:24 }}>
            {stepLabels.map((s,i) => (
              <div key={i} style={{ flex:1 }}>
                <div style={{ height:3, background: i<=step ? C.amber : C.border, borderRadius:2, marginBottom:4 }} />
                <div style={{ color: i<=step ? C.amber : C.textMuted, fontSize:11, textAlign:'center' }}>{s}</div>
              </div>
            ))}
          </div>

          {step === 0 && (
            <div>
              <div style={{ color:'#fff', fontSize:16, fontWeight:600, marginBottom:14 }}>{t('מה תצלם?', 'What will you shoot?')}</div>
              {shootTypes.map(opt => (
                <button key={opt.id} onClick={() => { setShoot(opt.id); setStep(1); }} style={{ background:C.card, border:`1px solid ${C.border}`, color:'#fff', borderRadius:14, padding:'14px 16px', width:'100%', display:'flex', alignItems:'center', gap:14, cursor:'pointer', marginBottom:10, textAlign:'right' }}>
                  <span style={{ fontSize:22 }}>{opt.icon}</span>
                  <span style={{ fontSize:15, fontWeight:500, flex:1 }}>{opt.label}</span>
                  <span style={{ color:C.amber }}>←</span>
                </button>
              ))}
            </div>
          )}

          {step === 1 && (
            <div>
              <div style={{ color:'#fff', fontSize:16, fontWeight:600, marginBottom:14 }}>{t('כמה מקורות אור יש לך?', 'How many light sources?')}</div>
              {lightOptions.map(opt => (
                <button key={opt.id} onClick={() => { setLights(opt.id); setStep(2); }} style={{ background:C.card, border:`1px solid ${C.border}`, color:'#fff', borderRadius:14, padding:'14px 16px', width:'100%', display:'flex', alignItems:'center', gap:14, cursor:'pointer', marginBottom:10, textAlign:'right' }}>
                  <span style={{ fontSize:18 }}>{opt.icon}</span>
                  <span style={{ fontSize:15, fontWeight:500, flex:1 }}>{opt.label}</span>
                  <span style={{ color:C.amber }}>{lang==='en'?'→':'←'}</span>
                </button>
              ))}
              <button onClick={() => setStep(0)} style={{ color:C.textMuted, background:'none', border:'none', cursor:'pointer', fontSize:13, padding:0, marginTop:4 }}>{t('← חזור', 'Back →')}</button>
            </div>
          )}

          {step === 2 && (
            <div>
              <div style={{ color:'#fff', fontSize:16, fontWeight:600, marginBottom:14 }}>{t('איזה סגנון תאורה?', 'Which lighting style?')}</div>
              {styleOptions.map(opt => (
                <button key={opt.id} onClick={() => pickStyle(opt.id)} style={{ background:C.card, border:`1px solid ${C.border}`, color:'#fff', borderRadius:14, padding:'14px 16px', width:'100%', display:'flex', alignItems:'center', gap:14, cursor:'pointer', marginBottom:10, textAlign:'right' }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:500, marginBottom:2 }}>{opt.label}</div>
                    <div style={{ color:C.textMuted, fontSize:12 }}>{opt.desc}</div>
                  </div>
                  <span style={{ color:C.amber }}>←</span>
                </button>
              ))}
              <button onClick={() => setStep(1)} style={{ color:C.textMuted, background:'none', border:'none', cursor:'pointer', fontSize:13, padding:0, marginTop:4 }}>{t('← חזור', 'Back →')}</button>
            </div>
          )}
        </div>
      );
    }

    // ─── LIGHTING COACH ───────────────────────────────────────────────────────
    const COACH_PROMPT = `אתה מאמן תאורה מקצועי לצילום. נתח את התאורה בתמונה הזו והחזר JSON בלבד, ללא טקסט נוסף.

{
  "score": 7,
  "pattern": "שם תבנית התאורה שזוהתה (למשל: רמברנדט, split, butterfly, flat, חלון)",
  "positives": ["דבר חיובי אחד", "דבר חיובי שני"],
  "issues": [
    { "problem": "תיאור הבעיה", "fix": "איך לתקן את זה בפועל", "difficulty": "קל" },
    { "problem": "תיאור בעיה שניה", "fix": "פתרון מעשי", "difficulty": "בינוני" }
  ],
  "quickFix": "הדבר הכי קל שאפשר לעשות עכשיו לשיפור מידי",
  "mood": "האווירה הנוכחית של התמונה במילה אחת"
}

score בין 1-10. difficulty: קל/בינוני/מתקדם. החזר 1-3 issues. JSON תקין בלבד.`;

    function LightingCoachPage() {
      const t    = useT();
      const lang = React.useContext(LangContext);
      const [step, setStep]           = useState(1);
      const [imgB64, setImgB64]       = useState(null);
      const [imgType, setImgType]     = useState('image/jpeg');
      const [preview, setPreview]     = useState(null);
      const [results, setResults]     = useState(null);
      const [error, setError]         = useState(null);
      const [doneSteps, setDoneSteps] = useState([]);
      const timers = useRef([]);
      const frontRef = useRef(null);
      const backRef  = useRef(null);

      const STEPS_TEXT = {
        he: ['🔍 מזהה תבנית תאורה...','💡 מנתח איכות האור...','🎯 מזהה בעיות ספציפיות...','✨ מכין המלצות שיפור...'],
        en: ['🔍 Identifying lighting pattern...','💡 Analyzing light quality...','🎯 Detecting specific issues...','✨ Preparing improvement tips...'],
      };

      function clearTimers() { timers.current.forEach(clearTimeout); timers.current = []; }

      function getExifOrientation(buffer) {
        const view = new DataView(buffer);
        if (view.getUint16(0, false) !== 0xFFD8) return 1;
        let offset = 2;
        while (offset < view.byteLength) {
          const marker = view.getUint16(offset, false);
          offset += 2;
          if (marker === 0xFFE1) {
            if (view.getUint32(offset + 2, false) === 0x45786966) {
              const little = view.getUint16(offset + 8, false) === 0x4949;
              const ifd = offset + 8 + view.getUint32(offset + 14, little);
              const tags = view.getUint16(ifd, little);
              for (let i = 0; i < tags; i++) {
                if (view.getUint16(ifd + 2 + i * 12, little) === 0x0112)
                  return view.getUint16(ifd + 2 + i * 12 + 8, little);
              }
            }
            return 1;
          }
          if ((marker & 0xFF00) !== 0xFF00) break;
          offset += view.getUint16(offset, false);
        }
        return 1;
      }

      function handleFile(file) {
        const arrayReader = new FileReader();
        arrayReader.onload = ae => {
          const orientation = getExifOrientation(ae.target.result);
          const dataReader = new FileReader();
          dataReader.onload = e => {
            const original = e.target.result;
            const img = new Image();
            img.onload = () => {
              const MAX = 1600;
              const swapped = orientation >= 5 && orientation <= 8;
              let w = swapped ? img.height : img.width;
              let h = swapped ? img.width : img.height;
              if (w > MAX || h > MAX) {
                if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                else { w = Math.round(w * MAX / h); h = MAX; }
              }
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext('2d');
              ctx.save();
              if (orientation === 2) { ctx.translate(w, 0); ctx.scale(-1, 1); }
              else if (orientation === 3) { ctx.translate(w, h); ctx.rotate(Math.PI); }
              else if (orientation === 4) { ctx.translate(0, h); ctx.scale(1, -1); }
              else if (orientation === 5) { ctx.rotate(Math.PI/2); ctx.scale(1, -1); }
              else if (orientation === 6) { ctx.translate(w, 0); ctx.rotate(Math.PI/2); }
              else if (orientation === 7) { ctx.translate(w, h); ctx.rotate(Math.PI/2); ctx.scale(1, -1); }
              else if (orientation === 8) { ctx.translate(0, h); ctx.rotate(-Math.PI/2); }
              if (swapped) ctx.drawImage(img, 0, 0, h, w);
              else ctx.drawImage(img, 0, 0, w, h);
              ctx.restore();
              const compressed = canvas.toDataURL('image/jpeg', 0.85);
              setImgType('image/jpeg');
              setImgB64(compressed.split(',')[1]);
              setPreview(compressed);
            };
            img.src = original;
          };
          dataReader.readAsDataURL(file);
        };
        arrayReader.readAsArrayBuffer(file);
      }

      async function analyze() {
        setStep(2); setError(null); setDoneSteps([]); clearTimers();
        const stepsText = STEPS_TEXT[lang];
        stepsText.forEach((txt, i) => {
          const timer = setTimeout(() => setDoneSteps(prev => [...prev, txt]), i * 1500 + 400);
          timers.current.push(timer);
        });
        const coachPromptLang = lang === 'en' ? COACH_PROMPT + '\nRespond with all text values in English.' : COACH_PROMPT;
        try {
          const resp = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-6',
              max_tokens: 1500,
              system: 'You are a professional photography lighting coach. Always respond with valid JSON only, no markdown, no code blocks. Just raw JSON.',
              messages: [{ role: 'user', content: [
                { type: 'image', source: { type: 'base64', media_type: imgType, data: imgB64 } },
                { type: 'text', text: coachPromptLang },
              ]}],
            }),
          });
          const rawText = await resp.text();
          let data;
          try { data = JSON.parse(rawText); } catch(e) { throw new Error(`שגיאת שרת: ${rawText.slice(0,80)}`); }
          if (!resp.ok) throw new Error(data.error?.message || `שגיאה ${resp.status}`);
          const raw = data.content[0].text;
          const cleaned = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
          const match = cleaned.match(/\{[\s\S]*\}/);
          if (!match) throw new Error('לא התקבלה תגובה תקינה. נסה שוב.');
          clearTimers();
          setResults(JSON.parse(match[0]));
          setStep(3);
        } catch(err) {
          clearTimers();
          setError(err.message);
          setStep(1);
        }
      }

      function reset() { clearTimers(); setStep(1); setResults(null); setPreview(null); setImgB64(null); setError(null); setDoneSteps([]); }

      const scoreColor = s => s >= 8 ? C.green : s >= 5 ? C.yellow : C.red;
      const diffColor2 = d => d === 'קל' ? C.green : d === 'בינוני' ? C.yellow : C.red;

      // Step 1
      if (step === 1) return (
        <div style={{ padding:'24px 18px 100px' }}>
          <div style={{ color:'#fff', fontSize:24, fontWeight:800, marginBottom:4 }}>{t('מאמן תאורה', 'Lighting Coach')}</div>
          <div style={{ color:C.textMuted, fontSize:13, marginBottom:24 }}>{t('צלם תמונה → AI מנתח את התאורה → טיפים לשיפור מיידי', 'Take a photo → AI analyzes lighting → instant improvement tips')}</div>

          {/* Camera buttons */}
          {!preview ? (
            <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:16 }}>
              {/* Front camera (portrait / selfie) */}
              <label style={{ display:'flex', alignItems:'center', gap:16, background:C.card, border:`2px solid ${C.amber}44`, borderRadius:18, padding:'20px 22px', cursor:'pointer' }}>
                <input ref={frontRef} type="file" accept="image/*" capture="user" style={{ display:'none' }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
                <div style={{ width:52, height:52, background:C.amber+'22', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:26 }}>🤳</span>
                </div>
                <div>
                  <div style={{ color:'#fff', fontSize:15, fontWeight:700 }}>{t('צלם פורטרט', 'Take Portrait')}</div>
                  <div style={{ color:C.textMuted, fontSize:12 }}>{t('מצלמה קדמית – לניתוח תאורת פנים', 'Front camera – for face/portrait lighting')}</div>
                </div>
              </label>

              {/* Back camera (scene / environment) */}
              <label style={{ display:'flex', alignItems:'center', gap:16, background:C.card, border:`2px solid ${C.border}`, borderRadius:18, padding:'20px 22px', cursor:'pointer' }}>
                <input ref={backRef} type="file" accept="image/*" capture="environment" style={{ display:'none' }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
                <div style={{ width:52, height:52, background:'#ffffff0A', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:26 }}>📷</span>
                </div>
                <div>
                  <div style={{ color:'#fff', fontSize:15, fontWeight:700 }}>{t('צלם סצנה', 'Shoot Scene')}</div>
                  <div style={{ color:C.textMuted, fontSize:12 }}>{t('מצלמה אחורית – לניתוח תאורת חלל', 'Back camera – for space lighting')}</div>
                </div>
              </label>

              {/* Gallery */}
              <label style={{ display:'flex', alignItems:'center', gap:16, background:C.card, border:`2px dashed ${C.border}`, borderRadius:18, padding:'16px 22px', cursor:'pointer' }}>
                <input type="file" accept="image/*" style={{ display:'none' }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
                <div style={{ width:52, height:52, background:'#ffffff0A', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:26 }}>🖼️</span>
                </div>
                <div>
                  <div style={{ color:'#fff', fontSize:15, fontWeight:700 }}>{t('בחר מהגלריה', 'Pick from Gallery')}</div>
                  <div style={{ color:C.textMuted, fontSize:12 }}>{t('העלה תמונה קיימת', 'Upload an existing photo')}</div>
                </div>
              </label>
            </div>
          ) : (
            <div style={{ marginBottom:16 }}>
              <img src={preview} style={{ width:'100%', borderRadius:16, maxHeight:340, objectFit:'contain', marginBottom:8 }} />
              <label style={{ display:'block', textAlign:'center', cursor:'pointer', color:C.textMuted, fontSize:12 }}>
                <input type="file" accept="image/*" style={{ display:'none' }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
                🔄 {t('החלף תמונה', 'Replace photo')}
              </label>
            </div>
          )}

          {error && <div style={{ background:'#2D0000', border:'1px solid #F8717133', borderRadius:12, padding:'12px 14px', marginBottom:12, color:'#F87171', fontSize:13 }}>⚠️ {error}</div>}

          <button onClick={analyze} disabled={!preview}
            style={{ background: preview ? C.amber : C.border, color: preview ? '#000' : C.textMuted, width:'100%', padding:'18px 0', borderRadius:16, fontSize:16, fontWeight:700, border:'none', cursor: preview ? 'pointer' : 'default' }}>
            {!preview ? t('צלם תמונה תחילה', 'Take a photo first') : t('⚡ נתח תאורה עם AI', '⚡ Analyze Lighting with AI')}
          </button>
        </div>
      );

      // Step 2
      if (step === 2) {
        const stepsText2 = STEPS_TEXT[lang];
        return (
          <div style={{ padding:'32px 18px 100px' }}>
            <div style={{ color:'#fff', fontSize:22, fontWeight:800, marginBottom:20 }}>{t('מנתח תאורה...', 'Analyzing lighting...')}</div>
            {preview && (
              <div style={{ position:'relative', marginBottom:24 }}>
                <img src={preview} style={{ width:'100%', borderRadius:16, maxHeight:280, objectFit:'contain', opacity:0.5 }} />
                <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <div style={{ width:56, height:56, border:`4px solid ${C.border}`, borderTopColor:C.amber, borderRadius:'50%', animation:'spin 0.9s linear infinite' }} />
                </div>
              </div>
            )}
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {doneSteps.map((txt, i) => (
                <div key={i} className="fade-up" style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'12px 16px', display:'flex', alignItems:'center', gap:10, color:'#fff', fontSize:13 }}>
                  <span style={{ color:C.green }}>✓</span> {txt}
                </div>
              ))}
              {doneSteps.length < stepsText2.length && (
                <div style={{ background:C.card, border:`1px solid ${C.amber}22`, borderRadius:12, padding:'12px 16px', display:'flex', alignItems:'center', gap:10, color:C.textSub, fontSize:13 }}>
                  <div style={{ width:14, height:14, border:`2px solid ${C.border}`, borderTopColor:C.amber, borderRadius:'50%', animation:'spin 0.8s linear infinite', flexShrink:0 }} />
                  {stepsText2[doneSteps.length]}
                </div>
              )}
            </div>
          </div>
        );
      }

      // Step 3
      if (step === 3 && results) {
        const { score, pattern, positives, issues, quickFix, mood } = results;
        return (
          <div style={{ paddingBottom:100 }}>
            {/* Score header */}
            <div style={{ background:'linear-gradient(160deg,#0D0D0D,#141414)', borderBottom:`1px solid ${C.border}`, padding:'20px 18px 24px' }}>
              <button onClick={reset} style={{ color:C.amber, background:'none', border:'none', cursor:'pointer', fontSize:13, padding:0, marginBottom:16 }}>{t('← ניתוח חדש', 'New Analysis →')}</button>
              <div style={{ display:'flex', alignItems:'center', gap:20 }}>
                {/* Score circle */}
                <div style={{ width:80, height:80, borderRadius:'50%', border:`4px solid ${scoreColor(score)}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <div style={{ color:scoreColor(score), fontSize:28, fontWeight:900, lineHeight:1 }}>{score}</div>
                  <div style={{ color:C.textMuted, fontSize:10 }}>{t('מתוך 10', 'out of 10')}</div>
                </div>
                <div>
                  <div style={{ color:'#fff', fontSize:18, fontWeight:800, marginBottom:4 }}>{t('ניתוח תאורה', 'Lighting Analysis')}</div>
                  {pattern && <div style={{ color:C.amber, fontSize:13, fontWeight:600, marginBottom:4 }}>{t('תבנית:', 'Pattern:')} {pattern}</div>}
                  {mood && <div style={{ color:C.textMuted, fontSize:12 }}>{t('אווירה:', 'Mood:')} {mood}</div>}
                </div>
              </div>
            </div>

            <div style={{ padding:'18px 18px 8px' }}>
              {/* Quick fix */}
              {quickFix && (
                <div style={{ background:'linear-gradient(135deg,#1A1000,#1A1200)', border:`1px solid ${C.amber}44`, borderRadius:16, padding:'14px 16px', marginBottom:16 }}>
                  <div style={{ color:C.amber, fontSize:12, fontWeight:700, marginBottom:6 }}>{t('⚡ תיקון מהיר – עכשיו', '⚡ Quick Fix – Right Now')}</div>
                  <div style={{ color:'#fff', fontSize:14, lineHeight:1.6 }}>{quickFix}</div>
                </div>
              )}

              {/* Positives */}
              {positives?.length > 0 && (
                <div style={{ marginBottom:16 }}>
                  <div style={{ color:'#fff', fontSize:14, fontWeight:700, marginBottom:10 }}>{t('✅ מה עובד טוב', '✅ What Works Well')}</div>
                  {positives.map((p, i) => (
                    <div key={i} style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:8 }}>
                      <span style={{ color:C.green, fontSize:14, flexShrink:0 }}>•</span>
                      <span style={{ color:'#D1D5DB', fontSize:13, lineHeight:1.6 }}>{p}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* Issues */}
              {issues?.length > 0 && (
                <div style={{ marginBottom:16 }}>
                  <div style={{ color:'#fff', fontSize:14, fontWeight:700, marginBottom:10 }}>{t('🔧 מה לשפר', '🔧 What to Improve')}</div>
                  {issues.map((issue, i) => (
                    <div key={i} className="fade-up" style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, overflow:'hidden', marginBottom:10 }}>
                      <div style={{ background:C.surface, padding:'10px 14px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                        <span style={{ color:'#fff', fontSize:13, fontWeight:600 }}>{issue.problem}</span>
                        <span style={{ color:diffColor2(issue.difficulty), fontSize:11, fontWeight:700, background:C.bg, padding:'2px 8px', borderRadius:8, flexShrink:0, marginRight:8 }}>{issue.difficulty}</span>
                      </div>
                      <div style={{ padding:'10px 14px', display:'flex', gap:8 }}>
                        <span style={{ color:C.amber, fontSize:13, flexShrink:0 }}>→</span>
                        <span style={{ color:'#9CA3AF', fontSize:13, lineHeight:1.6 }}>{issue.fix}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Preview */}
              {preview && <img src={preview} style={{ width:'100%', borderRadius:14, maxHeight:220, objectFit:'contain', opacity:0.7, marginBottom:16 }} />}

              <button onClick={reset} style={{ background:C.amber, color:'#000', width:'100%', padding:'14px 0', borderRadius:16, fontSize:14, fontWeight:700, border:'none', cursor:'pointer' }}>
                {t('📷 נתח תמונה חדשה', '📷 Analyze New Photo')}
              </button>
            </div>
          </div>
        );
      }
      return null;
    }

    // ─── APP ──────────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage]                     = useState('home');
      const [selectedChallenge, setSelectedChallenge] = useState(null);
      const [lang, setLang] = useState(() => localStorage.getItem('lm_lang') || 'he');

      useEffect(() => {
        document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
        document.documentElement.lang = lang;
        localStorage.setItem('lm_lang', lang);
      }, [lang]);

      return (
        <LangContext.Provider value={lang}>
          <div style={{ maxWidth:430, margin:'0 auto', minHeight:'100vh', background:C.bg, position:'relative' }}>
            {page === 'home'      && <HomePage setPage={setPage} setSelectedChallenge={setSelectedChallenge} />}
            {page === 'challenge' && <ChallengePage challenge={selectedChallenge} setPage={setPage} />}
            {page === 'scan'      && <SpaceScanPage />}
            {page === 'library'   && <LibraryPage />}
            {page === 'guide'     && <GuidePage />}
            {page === 'coach'     && <LightingCoachPage />}
            {page !== 'challenge' && <Navbar page={page} setPage={setPage} lang={lang} setLang={setLang} />}
          </div>
        </LangContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
